name: Release

# Triggered by a version tag (vX.Y.Z). It always builds the distributions, cuts a
# GitHub Release with the wheel + sdist attached, and publishes to PyPI.
#
# PyPI auth: Trusted Publishing (OIDC) - the publish job mints a short-lived
# identity token; there is no long-lived secret. The Trusted Publisher is
# registered on PyPI (project `nrdax` > Settings > Publishing) as owner
# NullRabbitLabs / repo nrdax-python / workflow release.yml / environment pypi,
# and must match the `environment: pypi` on the publish job below. The publish
# job runs only on this repository, so forks never attempt to publish. To
# publish an already-tagged version, use: Actions > Release > Run workflow >
# enter the tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Build and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  github-release:
    name: github release
    needs: build
    # Only when an actual tag is pushed (not on manual re-publish of an existing tag).
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

  publish-pypi:
    name: publish to PyPI
    needs: build
    # Never publish from forks.
    if: ${{ github.repository == 'NullRabbitLabs/nrdax-python' }}
    runs-on: ubuntu-latest
    # Must match the Trusted Publisher registered on PyPI (owner NullRabbitLabs,
    # repo nrdax-python, workflow release.yml, environment pypi).
    environment:
      name: pypi
      url: https://pypi.org/project/nrdax/
    permissions:
      # OIDC token for PyPI Trusted Publishing (no password/API token).
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
