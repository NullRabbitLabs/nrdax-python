name: Feature request
description: Suggest an enhancement to the nrdax library or CLI
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project is a read/query/export/citation/analysis interface for public
        NRDAX data. Producer or write-back features are out of scope (see the README
        non-goals). Roadmap-friendly ideas (more source adapters, TAXII, knowledge
        graph exports, citation styles) are welcome.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the library or CLI to do? Sketch the API/CLI.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
