name: Bug report
description: Report a problem with the nrdax library or CLI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please note whether this is a problem with the
        **tool** or with the **data** it returned - data-quality issues are worth
        reporting too, so the underlying dataset can be corrected.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: The exact command or a minimal Python snippet.
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `nrdax version` and `nrdax info`.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Library
        - Data source (feed/api/file/stix)
        - Exporter (json/csv/stix)
        - Citation
        - Data quality (a record/reference looks wrong)
        - Other
    validations:
      required: true
